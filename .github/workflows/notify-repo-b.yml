name: Notify automation repo

on:
  push:
    branches: [main]

jobs:
  trigger-gitlab-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Repo B pipeline
        env:
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          DEPLOYED_URL: ${{ secrets.DEPLOYED_URL }}
        run: |
          curl --fail --request POST \
            --form token="$GITLAB_TRIGGER_TOKEN" \
            --form ref=main \
            --form "variables[COMMIT_SHA]=${{ github.sha }}" \
            --form "variables[COMMIT_MSG]=${{ github.event.head_commit.message }}" \
            --form "variables[DEPLOYED_URL]=$DEPLOYED_URL" \
            "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/trigger/pipeline"
